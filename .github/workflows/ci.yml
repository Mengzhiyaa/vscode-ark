name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPERVISOR_CHECKOUT_PATH: .deps/vscode-supervisor
      SUPERVISOR_REPOSITORY: Blakfs24/vscode-supervisor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout supervisor API source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SUPERVISOR_REPOSITORY }}
          path: ${{ env.SUPERVISOR_CHECKOUT_PATH }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            .deps/vscode-supervisor/package-lock.json

      - name: Install ark dependencies
        run: npm ci

      - name: Install supervisor dependencies
        run: npm ci
        working-directory: ${{ env.SUPERVISOR_CHECKOUT_PATH }}

      - name: Build supervisor development dependency
        run: npm run build
        working-directory: ${{ env.SUPERVISOR_CHECKOUT_PATH }}

      - name: Verify public API sync
        run: npm run verify:supervisor-api -- $SUPERVISOR_CHECKOUT_PATH

      - name: Run tests
        env:
          SUPERVISOR_DEV_EXTENSION_PATH: ${{ env.SUPERVISOR_CHECKOUT_PATH }}
        run: npm run test:unit:ext

      - name: Install target binaries
        run: npm run install:binaries -- --retry 3

      - name: Package Linux VSIX smoke artifact
        run: |
          mkdir -p artifacts
          npx vsce package --no-dependencies --target linux-x64 --out artifacts/vscode-ark-linux-x64.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-ark-linux-x64
          path: artifacts/*.vsix
          retention-days: 14
